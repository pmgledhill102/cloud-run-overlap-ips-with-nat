name: Export drawio to SVG

on:
  push:
    branches: [main]
    paths:
      - "**/diagrams/*.drawio"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - direct-vpc-egress/docs/diagrams
          - vpc-connector/docs/diagrams
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for drawio files
        id: check
        run: |
          if ls ${{ matrix.path }}/*.drawio 1>/dev/null 2>&1; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Export drawio files to SVG
        if: steps.check.outputs.has_files == 'true'
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: ${{ matrix.path }}
          format: svg
          transparent: false
          action-mode: all
          output: .
          remove-page-suffix: true

      - name: Commit and push updated SVGs
        if: steps.check.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ matrix.path }}/*.svg
          if ! git diff --cached --quiet; then
            git commit -m "Auto-export drawio diagrams to SVG [${{ matrix.path }}]"
            git pull --rebase origin main
            git push
          fi
